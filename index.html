<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FYZEN-LAB Quotation System</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f7fb;
margin:0;
padding:40px;
color:#172033;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo{
font-size:34px;
font-weight:900;
color:#082d5c;
}

.quote-title{
font-size:30px;
font-weight:900;
color:#03a9d8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #dce8f3;
font-size:15px;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#082d5c;
color:white;
padding:14px;
}

td{
border:1px solid #dce8f3;
padding:12px;
}

button{
background:#03a9d8;
color:white;
border:none;
padding:14px 22px;
border-radius:12px;
font-weight:800;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#0285ac;
}

.total{
margin-top:25px;
font-size:24px;
font-weight:900;
text-align:right;
color:#082d5c;
}

.footer{
margin-top:50px;
font-size:14px;
color:#64748b;
}

@media print{
button{
display:none;
}

body{
background:white;
padding:0;
}

.container{
box-shadow:none;
}
}

</style>
</head>

<body>

<div class="container">

<div class="top">
<div class="logo">FYZEN-LAB</div>
<div class="quote-title">COMMERCIAL OFFER</div>
</div>

<div class="grid">
<input type="text" placeholder="Client Name">
<input type="text" placeholder="Quotation Number">
<input type="text" placeholder="Company Name">
<input type="date">
</div>

<table id="quoteTable">

<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

<tr>
<td><input type="text" placeholder="Product name"></td>
<td><input type="number" value="1" class="qty"></td>
<td><input type="number" value="0" class="price"></td>
<td class="lineTotal">0</td>
</tr>

</table>

<button onclick="addRow()">Add Product</button>

<div class="total">
Grand Total: $<span id="grandTotal">0</span>
</div>

<button onclick="window.print()">Print / Save PDF</button>

<div class="footer">
FYZEN-LAB | info@fyzen-lab.uz | +998 87 190 2002
</div>

</div>

<script>

function calculate(){

let rows=document.querySelectorAll("#quoteTable tr");
let grand=0;

rows.forEach((row,index)=>{

if(index===0)return;

let qty=row.querySelector(".qty").value;
let price=row.querySelector(".price").value;

let total=qty*price;

row.querySelector(".lineTotal").innerText=total;

grand+=total;

});

document.getElementById("grandTotal").innerText=grand;

}

document.addEventListener("input",calculate);

function addRow(){

let table=document.getElementById("quoteTable");

let row=table.insertRow();

row.innerHTML=`

<td><input type="text" placeholder="Product name"></td>
<td><input type="number" value="1" class="qty"></td>
<td><input type="number" value="0" class="price"></td>
<td class="lineTotal">0</td>

`;

}

</script>

</body>
</html>
