<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYZEN-LAB Quote System</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#e9eff6;
  font-family:Arial,sans-serif;
  padding:20px;
}

.page{
  width:980px;

  margin:auto;

  background:#fff;

  position:relative;

  overflow:visible;

  padding:60px 38px 0;

  box-shadow:0 18px 55px rgba(0,0,0,.16);

  display:flex;
  flex-direction:column;
}

.footer-area{
  position:relative;

  left:-38px;

  width:calc(100% + 76px);

  margin-top:auto;

  height:86px;

  break-inside:avoid;
  page-break-inside:avoid;
}

.bottom{
  position:relative;

  width:100%;
  height:86px;

  background:linear-gradient(
    90deg,
    #001744 0%,
    #002f86 58%,
    #0084e8 100%
  );

  clip-path:polygon(
    0 18%,
    58% 52%,
    100% 0,
    100% 100%,
    0 100%
  );

  overflow:hidden;
}

.bottom::before{
  content:"";

  position:absolute;

  right:35%;
  bottom:0;

  width:58px;
  height:86px;

  background:#fff;

  transform:skewX(-38deg);
}

.footer{
  position:absolute;

  left:40px;
  bottom:22px;

  z-index:5;

  display:flex;
  align-items:center;
  gap:16px;

  color:#fff;
  font-family:Arial,sans-serif;
  font-weight:900;
}

.footer-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.footer-icon{
  width:32px;
  height:32px;

  border:2px solid rgba(255,255,255,.92);
  border-radius:9px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:15px;
}

.footer-brand{
  font-size:15px;
  letter-spacing:.3px;
}

.footer-divider{
  width:1px;
  height:24px;

  background:rgba(255,255,255,.75);
}

.footer-text{
  font-size:14px;
  letter-spacing:.5px;
  font-weight:700;
}

.signature-contact{
  display:grid;
  grid-template-columns:1fr 1fr;

  gap:60px;

  margin-top:18px;

  align-items:start;

  break-inside:avoid;
  page-break-inside:avoid;
}

.signature{
  position:relative;

  min-height:180px;

  display:flex;
  align-items:flex-start;
  justify-content:space-between;

  gap:30px;

  padding-top:8px;
}

.signature::before{
  content:"";

  position:absolute;

  left:0;
  bottom:0;

  width:100%;
  height:1px;

  background:linear-gradient(
    90deg,
    transparent,
    #c5d8ea,
    transparent
  );
}

.signature-role{
  color:#b88413;
  font-size:16px;
  font-weight:900;

  margin-bottom:10px;

  white-space:nowrap;
}

.signature-name{
  font-size:32px;
  font-weight:900;
  color:#003f91;

  margin-top:20px;

  transform:translateY(12px);
}

.signature-line{
  width:160px;
  height:2px;

  margin-top:16px;

  background:linear-gradient(
    90deg,
    #003f91,
    transparent
  );
}

.stamp{
  width:190px;
  height:190px;

  display:flex;
  align-items:center;
  justify-content:center;
}

.stamp img{
  width:180px;
  height:180px;

  object-fit:contain;

  opacity:.96;

  filter:contrast(1.06) saturate(1.08);

  mix-blend-mode:multiply;
}

.manager-lux{
  min-height:180px;

  display:flex;
  flex-direction:column;

  justify-content:flex-start;

  text-align:center;

  padding-top:6px;
}

.manager-top-input{
  border:none;
  background:transparent;

  width:100%;

  text-align:center;

  color:#b88413;

  font-size:14px;
  font-weight:900;

  outline:none;

  margin-bottom:10px;
}

.manager-name-input{
  border:none;
  background:transparent;

  width:100%;

  text-align:center;

  font-size:25px;
  font-weight:900;

  color:#003f91;

  outline:none;

  margin-bottom:14px;
}

.manager-divider{
  height:2px;

  background:linear-gradient(
    90deg,
    transparent,
    #003f91,
    transparent
  );

  margin:12px 0;
}

.manager-phone{
  display:flex;
  align-items:center;
  justify-content:center;

  gap:14px;

  margin-top:8px;
}

.manager-phone span{
  width:38px;
  height:38px;

  border-radius:50%;
  border:2px solid #003f91;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#003f91;

  font-size:18px;
}

.manager-phone-input{
  border:none;
  background:transparent;

  font-size:22px;
  font-weight:900;

  color:#003f91;

  outline:none;

  width:245px;
}

@media print{

  *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }

  @page{
    size:A4;
    margin:0;
  }

  html,
  body{
    width:210mm;
    margin:0;
    padding:0;
    background:#fff;
  }

  body{
    padding:0!important;
  }

  .page{
    width:980px;

    margin:0 auto;

    box-shadow:none;

    overflow:visible!important;

    page-break-after:auto;
    page-break-inside:auto;

    display:block!important;
  }

  .actions,
  .imgFile,
  .remove-btn{
    display:none!important;
  }

  #quoteTable th:last-child,
  #quoteTable td:last-child{
    display:none!important;
  }

  textarea,
  input{
    border:none!important;
    outline:none!important;
    box-shadow:none!important;
    resize:none!important;
  }

  table{
    page-break-inside:auto;
  }

  tr{
    page-break-inside:avoid;
    page-break-after:auto;
  }

  td,
  th{
    page-break-inside:avoid;
  }

  .signature-contact,
  .footer-area{
    break-inside:avoid;
    page-break-inside:avoid;
  }

}

</style>
</head>
<body>
